name: Build and Push Docker Image

# 触发条件：
# 1. 推送到 main 分支
# 2. 打标签（如 v1.0.0）
# 3. 手动触发
on:
  push:
    tags: [ 'v*' ]  # 匹配 v1.0.0、v1.0.0 等标签
  workflow_dispatch:  # 手动触发

# 工作流权限
permissions:
  contents: write  # 用于创建 GitHub Release
  packages: write  # 用于推送 GitHub Packages

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：拉取代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取所有历史，确保能获取 tag 信息

      # 步骤2：设置 Docker Buildx（支持多架构构建）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 步骤3：登录 Docker Hub
      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # 步骤4：登录 GitHub Packages（如需移除，直接删除此步骤）
      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 步骤5：提取镜像标签（自动适配分支/标签）
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # 仅保留 Docker Hub + GitHub Packages（如需移除 GitHub Packages，删除第二行）
          images: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/volc-tos-cert-sync
            ghcr.io/${{ github.actor }}/volc-tos-cert-sync
          # 标签规则：
          # - 打标签时用标签名（如 v1.0.0）
          # - main 分支用 latest
          # - 提交哈希作为标签
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # 步骤6：构建并推送 Docker 镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .  # 构建上下文（Dockerfile 所在目录）
          push: ${{ github.event_name != 'pull_request' }}  # PR 时不推送
          tags: ${{ steps.meta.outputs.tags }}  # 自动生成的标签
          labels: ${{ steps.meta.outputs.labels }}  # 自动生成的标签（含LABEL元信息）
          cache-from: type=gha  # 缓存构建层，加速后续构建
          cache-to: type=gha,mode=max

      - name: Generate changelog
        id: changelog
        run: |
          # 获取当前 tag
          CURRENT_TAG=${{ github.ref_name }}
          # 获取上一个 tag（按语义化版本排序，取倒数第二个）
          PREV_TAG=$(git tag --sort=-v:refname | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+$" | sed -n '2p')
          
          if [ -z "$PREV_TAG" ]; then
            # 首次发布，没有上一个 tag，直接列出所有提交
            CHANGELOG=$(git log --pretty="- %s (%h)" $CURRENT_TAG)
          else
            # 生成从 PREV_TAG 到 CURRENT_TAG 的提交列表
            CHANGELOG=$(git log --pretty="- %s (%h)" $PREV_TAG..$CURRENT_TAG)
          fi
          
          # 把变更日志写入 GITHUB_OUTPUT，供后续步骤使用
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # 步骤7：创建 GitHub Release（仅合法 tag 触发时执行）
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '.')  # 仅匹配 vX.Y.Z 格式标签
        uses: softprops/action-gh-release@v2
        with:
          # 强制使用 tag 名作为 Release 标题，避免空值
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## 版本更新
            - Docker 镜像：${{ secrets.DOCKER_HUB_USERNAME }}/volc-tos-cert-sync:${{ github.ref_name }}
            - GitHub Packages 镜像：ghcr.io/${{ github.actor }}/volc-tos-cert-sync:${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}